<label for="input"> search color:</label>
<input type="text" id="input">
<button id="button" onclick="getData()">Get data</button>

<script>
    async function getData() {
        const keyword = document.getElementById("input").value;
        const url = "https://apis.dnjs.lk/objects/colors.php?search=" + keyword;
        const response = await fetch(url);
        const data = await response.json();
        console.log(data);
    }
</script>
