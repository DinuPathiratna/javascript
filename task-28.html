<label for="input"> search color:</label>
<input type="text" id="input">
<button id="button" onclick="getData()">Get Data</button>

<script>
    async function getData() {
        const data = await fetch("https://apis.dnjs.lk/objects/colors.php?search=red");
        const response = await data.json();

        const input = document.getElementById("input").value;

        const filteredData = response.filter(item => item.name.toLowerCase().includes(input.toLowerCase()));
        
        console.log(filteredData);
    }
</script>
