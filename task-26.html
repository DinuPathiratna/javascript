<label for="name">name:</label>
<input type="text" id="name">
<br><br>
<label for="age">age:</label>
<input type="text" id="age">
<br><br>
<label for="town">town:</label>
<input type="text" id="town">
<br><br>
<button id="printButton">print</button>

<script>
    const button = document.getElementById("printButton");
    const nameInput = document.getElementById("name");
    const ageInput = document.getElementById("age");
    const townInput = document.getElementById("town");

    button.addEventListener("click", () => {

        const iframe = document.createElement("iframe")
        iframe.style.display = "none"

        iframe.addEventListener("load", () => {
            iframe.contentDocument.querySelector("#name").innerHTML = nameInput.value
            iframe.contentDocument.querySelector("#age").innerHTML = ageInput.value
            iframe.contentDocument.querySelector("#town").innerHTML = townInput.value

            iframe.contentWindow.print()
            setTimeout(() => iframe.remove(), 100)
        })

        iframe.src = "task-26-print.html"
        document.body.appendChild(iframe)

        iframe.contentWindow.print()
    })
</script>

</body>
</html>
