<script>
    const mark = prompt("enter mark ")

    if (mark < 0, mark > 100) {
        console.log("invalid number")
    }
     else if (mark >= 75) {
        console.log("Distinction")
    }
    else if (mark >= 65) {
        console.log("Merit")
    }
    else if (mark >= 50) {
        console.log("Pass")
    }
    else {
        console.log("Fail")
    }

</script>
