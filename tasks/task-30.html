<script>
    const option = prompt("choose difficulty (1,2,3): ")
    const random = 1 + Math.floor(Math.random() * 10)
    let count = 1
    let Num = ""

    if (option == 1) {
        Num = 6
    }
    else if (option == 2) {
        Num = 4
    }
    else if (option == 3) {
        Num = 3
    }

    while (count <= Num) {

        const guess = prompt("enter your guess(1-10): ")

        if (guess == random) {
            console.log("correct")
            break
        }

        else {
            if (guess < random) {
                console.log('answer is greater')
            }

            else {
                console.log("answer is lesser")
            }

        }
        count = count + 1


    }
    console.log("answer is", random)

</script>
