<script type="module">

    const data = await fetch("data/animals.json")
        .then(res => res.json())

    const findAnimals = (className, minLifespan, maxLifespan) => {
        const output = []

        const letters = Object.keys(data)

        for (let i = 0; i < letters.length; i++) {
            const letter = letters[i]
            const animals = data[letter]

            const animalNames = Object.keys(animals)

            for (let j = 0; j < animalNames.length; j++) {
                const name = animalNames[j]
                const animal = animals[name]

                if (animal.Classification?.Class === className) {

                    const lifespanYears = parseInt(animal.Characteristics.Lifespan)
                    if (isNaN(lifespanYears)) continue

                    const lifespanDays = lifespanYears * 365

                    if (minLifespan !== null && lifespanDays < minLifespan) continue
                    if (maxLifespan !== null && lifespanDays > maxLifespan) continue


                    output.push({
                        name: name,
                        lifespan: lifespanDays
                    })
                }
            }
        }

        return output
    }

    console.log(findAnimals("Actinopterygii", 200, 1200))
    console.log(findAnimals("Cephalopoda", null, 1200))
    console.log(findAnimals("Mammalia", 200, null))

</script>
