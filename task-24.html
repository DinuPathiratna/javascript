<label for="inputText">Type file name: </label>
<input type="text" id="inputText">
<br><br>
<label for="textAreaInput">Type file content: </label>
<textarea id="textAreaInput"></textarea>
<br><br>
<button id="downloadBtn">Download</button>

<script>
   const fileName = document.getElementById("inputText")
   const textareaInput = document.getElementById("textAreaInput")
   const Btn = document.getElementById("downloadBtn")

   //Click event to download the file
   Btn.addEventListener("click", () => {

      const blob = new Blob([textareaInput.value], { type: "text/plain" })
      const url = URL.createObjectURL(blob)

      const a = document.createElement("a")
      a.href = url    
      a.download = fileName.value
      a.click()
   })
   //confirmation msg when exiting the tab if user has inputted text but hasn't downloaded the file
   window.addEventListener("input", () => {
      //confirmation if user tries to exit
      window.addEventListener("beforeunload", (e) => {
         //check if filename or textarea has value, if not confirmation message will pop up
         if (fileName.value !== "" || textareaInput.value !== "") {
            //confirmation message
            e.preventDefault()
         }
      })
   })
</script>
